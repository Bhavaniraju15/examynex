<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Profile - ExamyNex</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../static/css/main.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-brand">
            <h3><i class="bi bi-mortarboard-fill"></i> ExamyNex</h3>
            <small>Faculty Panel</small>
        </div>
        <ul class="sidebar-menu">
            <li><a href="dashboard.html" data-menu="dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li><a href="create-exam.html" data-menu="create"><i class="bi bi-plus-circle"></i> Create Exam</a></li>
            <li><a href="students.html" data-menu="students"><i class="bi bi-people"></i> Students</a></li>
            <li><a href="monitoring.html" data-menu="monitoring"><i class="bi bi-eye"></i> Live Monitoring</a></li>
            <li><a href="analytics.html" data-menu="analytics"><i class="bi bi-graph-up"></i> Analytics</a></li>
            <li><a href="profile.html" data-menu="profile" class="active"><i class="bi bi-person"></i> Profile</a></li>
            <li><a href="../../templates/auth/login.html"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <h2 class="mb-4"><i class="bi bi-person"></i> Faculty Profile</h2>
        
        <div id="alertContainer"></div>
        
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Profile Information</h5>
            </div>
            <div class="card-body">
                <form id="profileForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="facultyName" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="facultyEmail" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Department</label>
                        <select class="form-select" id="facultyDepartment" required>
                            <option value="">Select Department</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Subjects Handled</label>
                        <input type="text" class="form-control" id="subjectsHandled"  required>
                        <small class="text-muted">Comma-separated list of subjects</small>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Approval Status</label>
                        <div>
                            <span class="badge badge-success">Approved</span>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> Update Profile
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../static/js/utils.js"></script>
    <script>
        Utils.setActiveMenu('profile');
        
        document.addEventListener('DOMContentLoaded', function() {
            Utils.generateBranchDropdown('facultyDepartment');
            // Set current department
            document.getElementById('facultyDepartment').value = 'CSE';
        });
        
        document.getElementById('profileForm').addEventListener('submit', function(e) {
            e.preventDefault();
            Utils.showAlert('Profile updated successfully', 'success', 'alertContainer');
        });
    </script>
</body>
</html>
