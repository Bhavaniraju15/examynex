<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Monitoring - ExamyNex</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../static/css/main.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-brand">
            <h3><i class="bi bi-mortarboard-fill"></i> ExamyNex</h3>
            <small>Faculty Panel</small>
        </div>
        <ul class="sidebar-menu">
            <li><a href="dashboard.html" data-menu="dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li><a href="create-exam.html" data-menu="create"><i class="bi bi-plus-circle"></i> Create Exam</a></li>
            <li><a href="students.html" data-menu="students"><i class="bi bi-people"></i> Students</a></li>
            <li><a href="monitoring.html" data-menu="monitoring" class="active"><i class="bi bi-eye"></i> Live Monitoring</a></li>
            <li><a href="analytics.html" data-menu="analytics"><i class="bi bi-graph-up"></i> Analytics</a></li>
            <li><a href="profile.html" data-menu="profile"><i class="bi bi-person"></i> Profile</a></li>
            <li><a href="../../templates/auth/login.html"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <h2 class="mb-4"><i class="bi bi-eye"></i> Live Monitoring Dashboard</h2>
        
        <div class="card mb-3">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4">
                        <label class="form-label">Select Exam</label>
                        <select class="form-select" id="examSelect" onchange="loadMonitoringData()">
                            <option value="">Select Exam</option>
                            <option value="1">Mathematics Final Exam</option>
                            <option value="2">Physics Midterm</option>
                            <option value="3">Data Structures Quiz</option>
                        </select>
                    </div>
                    <div class="col-md-8 text-end">
                        <span class="badge badge-info" id="connectionStatus">
                            <i class="bi bi-circle-fill"></i> WebSocket Connected
                        </span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Active Exam Sessions</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Student Name</th>
                                <th>Roll Number</th>
                                <th>Remaining Time</th>
                                <th>Violations Count</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="monitoringTable">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../static/js/utils.js"></script>
    <script>
        Utils.setActiveMenu('monitoring');
        
        // WebSocket placeholder for real-time updates
        let ws = null;
        
        function loadMonitoringData() {
            const examId = document.getElementById('examSelect').value;
            if (!examId) return;
            
            // Placeholder: Initialize WebSocket connection
            // ws = new WebSocket('ws://localhost:8000/ws/monitoring/' + examId + '/');
            
            // Simulate real-time updates
            simulateUpdates();
        }
        
        function simulateUpdates() {
            // Simulate countdown timers
            setInterval(() => {
                const time1 = document.getElementById('time-1');
                if (time1 && time1.textContent !== '--:--') {
                    const [mins, secs] = time1.textContent.split(':').map(Number);
                    let totalSecs = mins * 60 + secs - 1;
                    if (totalSecs < 0) totalSecs = 0;
                    const newMins = Math.floor(totalSecs / 60);
                    const newSecs = totalSecs % 60;
                    time1.textContent = `${newMins.toString().padStart(2, '0')}:${newSecs.toString().padStart(2, '0')}`;
                }
                
                const time2 = document.getElementById('time-2');
                if (time2 && time2.textContent !== '--:--') {
                    const [mins, secs] = time2.textContent.split(':').map(Number);
                    let totalSecs = mins * 60 + secs - 1;
                    if (totalSecs < 0) totalSecs = 0;
                    const newMins = Math.floor(totalSecs / 60);
                    const newSecs = totalSecs % 60;
                    time2.textContent = `${newMins.toString().padStart(2, '0')}:${newSecs.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }
        
        // Auto-load when page loads
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('examSelect').value = '1';
            loadMonitoringData();
        });
    </script>
</body>
</html>
