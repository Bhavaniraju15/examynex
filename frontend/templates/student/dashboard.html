<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - ExamyNex</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../static/css/main.css">
</head>

<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-brand">
            <h3><i class="bi bi-mortarboard-fill"></i> ExamyNex</h3>
            <small>Student Panel</small>
        </div>
        <ul class="sidebar-menu">
            <li><a href="dashboard.html" data-menu="dashboard" class="active"><i class="bi bi-speedometer2"></i>
                    Dashboard</a></li>
            <li><a href="exams.html" data-menu="exams"><i class="bi bi-file-earmark-text"></i> My Exams</a></li>
            <li><a href="results.html" data-menu="results"><i class="bi bi-clipboard-check"></i> Results</a></li>
            <li><a href="../../templates/auth/login.html"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <h2 class="mb-4"><i class="bi bi-speedometer2"></i> Student Dashboard</h2>

        <!-- Stats Cards -->
        <div class="row">
            <div class="col-md-4">
                <div class="stats-card">
                    <p>Upcoming Exams</p>

                </div>
            </div>
            <div class="col-md-4">
                <div class="stats-card" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%);">
                    <p>Completed Exams</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stats-card" style="background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);">
                    <p>Violations Count</p>
                </div>
            </div>
        </div>

        <!-- Upcoming Exams -->
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Upcoming Exams</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Exam Title</th>
                                <th>Subject</th>
                                <th>Date</th>
                                <th>Duration</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../static/js/utils.js"></script>
    <script>
        Utils.setActiveMenu('dashboard');

        let exams = [];
        let submissions = [];

        // Load dashboard data
        async function loadDashboard() {
            try {
                // Fetch exams
                exams = await Utils.apiCall('/exams/', 'GET');
                console.log('Exams loaded:', exams);

                // Update stats
                updateStats();

                // Display exams
                displayExams();

            } catch (error) {
                console.error('Error loading dashboard:', error);
                document.querySelector('.card-body').innerHTML = `
                    <div class="alert alert-warning">
                        Failed to load exams. Please try refreshing the page.
                    </div>
                `;
            }
        }

        function updateStats() {
            // For now, show exam counts (can be enhanced with submission data later)
            const upcomingCount = exams.length;
            const completedCount = 0; // Would need to fetch submissions
            const violationsCount = 0; // Would need to fetch from proctoring data

            // Update stat cards
            const statCards = document.querySelectorAll('.stats-card');
            statCards[0].innerHTML = `
                <h3>${upcomingCount}</h3>
                <p>Upcoming Exams</p>
            `;
            statCards[1].innerHTML = `
                <h3>${completedCount}</h3>
                <p>Completed Exams</p>
            `;
            statCards[2].innerHTML = `
                <h3>${violationsCount}</h3>
                <p>Violations Count</p>
            `;
        }

        function displayExams() {
            const tbody = document.createElement('tbody');

            if (exams.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="text-center text-muted">
                            No exams available at the moment
                        </td>
                    </tr>
                `;
            } else {
                exams.forEach(exam => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><strong>${exam.title}</strong></td>
                        <td>${exam.description || 'N/A'}</td>
                        <td>${new Date().toLocaleDateString()}</td>
                        <td>${exam.duration} min</td>
                        <td><span class="badge bg-success">Available</span></td>
                        <td>
                            <a href="exam-attempt.html?exam_id=${exam.id}" class="btn btn-sm btn-primary">
                                <i class="bi bi-play-fill"></i> Start Exam
                            </a>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            }

            document.querySelector('table').appendChild(tbody);
        }

        // Load on page load
        loadDashboard();
    </script>
</body>

</html>
