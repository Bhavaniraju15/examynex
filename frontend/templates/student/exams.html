<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Exams - ExamyNex</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../static/css/main.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-brand">
            <h3><i class="bi bi-mortarboard-fill"></i> ExamyNex</h3>
            <small>Student Panel</small>
        </div>
        <ul class="sidebar-menu">
            <li><a href="dashboard.html" data-menu="dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li><a href="exams.html" data-menu="exams" class="active"><i class="bi bi-file-earmark-text"></i> My Exams</a></li>
            <li><a href="results.html" data-menu="results"><i class="bi bi-clipboard-check"></i> Results</a></li>
            <li><a href="../../templates/auth/login.html"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <h2 class="mb-4"><i class="bi bi-file-earmark-text"></i> My Exams</h2>
        
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">All Exams</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Exam Title</th>
                                <th>Subject</th>
                                <th>Date</th>
                                <th>Duration</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="examsTableBody">
                            <tr>
                                <td colspan="6" class="text-center">Loading exams...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../static/js/utils.js"></script>
    <script>
        Utils.setActiveMenu('exams');
        
        // Load exams from backend
        async function loadExams() {
            try {
                const exams = await Utils.apiCall('/exams/', 'GET');
                const tbody = document.getElementById('examsTableBody');
                
                if (!exams || exams.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center">No exams available</td></tr>';
                    return;
                }
                
                tbody.innerHTML = exams.map(exam => `
                    <tr>
                        <td>${exam.title || 'Untitled Exam'}</td>
                        <td>${exam.description || 'N/A'}</td>
                        <td>N/A</td>
                        <td>N/A</td>
                        <td><span class="badge bg-success">Available</span></td>
                        <td>
                            <a href="exam-instructions.html?examId=${exam.id}" class="btn btn-sm btn-primary">
                                <i class="bi bi-play-circle"></i> Start Exam
                            </a>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error loading exams:', error);
                document.getElementById('examsTableBody').innerHTML = 
                    '<tr><td colspan="6" class="text-center text-danger">Failed to load exams. Please try again.</td></tr>';
            }
        }
        
        // Load exams on page load
        document.addEventListener('DOMContentLoaded', loadExams);
    </script>
</body>
</html>
