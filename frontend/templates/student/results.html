<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Results - ExamyNex</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../static/css/main.css">
</head>

<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-brand">
            <h3><i class="bi bi-mortarboard-fill"></i> ExamyNex</h3>
            <small>Student Panel</small>
        </div>
        <ul class="sidebar-menu">
            <li><a href="dashboard.html" data-menu="dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li><a href="exams.html" data-menu="exams"><i class="bi bi-file-earmark-text"></i> My Exams</a></li>
            <li><a href="results.html" data-menu="results" class="active"><i class="bi bi-clipboard-check"></i>
                    Results</a></li>
            <li><a href="../../templates/auth/login.html"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <h2 class="mb-4"><i class="bi bi-clipboard-check"></i> Exam Results</h2>

        <!-- Summary Card -->
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0">Mathematics Final Exam - Results Summary</h5>
            </div>
        </div>

        <!-- Detailed Results -->
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Question-wise Results</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Question</th>
                                <th>Your Answer</th>
                                <th>Correct Answer</th>
                                <th>Marks</th>
                            </tr>
                        </thead>
                    </table>
                </div>
            </div>
        </div>

        <div class="mt-3">
            <a href="exams.html" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Back to Exams
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../static/js/utils.js"></script>
    <script>
        Utils.setActiveMenu('results');

        // Demo results data (in real app, fetch from backend)
        const demoResults = {
            examTitle: "Mathematics Final Exam",
            totalQuestions: 5,
            correctAnswers: 3,
            totalMarks: 50,
            scoredMarks: 30,
            questions: [
                { q: "What is the derivative of x²?", yourAnswer: "2x", correctAnswer: "2x", correct: true, marks: 10 },
                { q: "What is the integral of 2x?", yourAnswer: "x² + C", correctAnswer: "x² + C", correct: true, marks: 10 },
                { q: "What is the value of π (pi)?", yourAnswer: "3.14", correctAnswer: "3.14159", correct: false, marks: 0 },
                { q: "What is 2 + 2?", yourAnswer: "4", correctAnswer: "4", correct: true, marks: 10 },
                { q: "What is the capital of France?", yourAnswer: "London", correctAnswer: "Paris", correct: false, marks: 0 }
            ]
        };

        // Display results
        function displayResults() {
            const percentage = ((demoResults.scoredMarks / demoResults.totalMarks) * 100).toFixed(1);

            // Update summary
            const summaryCard = document.querySelector('.card:first-of-type .card-header');
            summaryCard.innerHTML = `
                <h5 class="mb-3">${demoResults.examTitle} - Results Summary</h5>
                <div class="row text-center">
                    <div class="col-md-3">
                        <h3 class="text-primary">${demoResults.scoredMarks}/${demoResults.totalMarks}</h3>
                        <small>Total Score</small>
                    </div>
                    <div class="col-md-3">
                        <h3 class="text-success">${percentage}%</h3>
                        <small>Percentage</small>
                    </div>
                    <div class="col-md-3">
                        <h3 class="text-success">${demoResults.correctAnswers}</h3>
                        <small>Correct</small>
                    </div>
                    <div class="col-md-3">
                        <h3 class="text-danger">${demoResults.totalQuestions - demoResults.correctAnswers}</h3>
                        <small>Incorrect</small>
                    </div>
                </div>
            `;

            // Display question-wise results
            const tbody = document.createElement('tbody');
            demoResults.questions.forEach((q, idx) => {
                const row = document.createElement('tr');
                row.className = q.correct ? 'table-success' : 'table-danger';
                row.innerHTML = `
                    <td>${idx + 1}. ${q.q}</td>
                    <td>${q.yourAnswer}</td>
                    <td>${q.correctAnswer}</td>
                    <td><strong>${q.marks}/10</strong></td>
                `;
                tbody.appendChild(row);
            });

            document.querySelector('table').appendChild(tbody);
        }

        // Load results on page load
        displayResults();
    </script>
</body>

</html>
