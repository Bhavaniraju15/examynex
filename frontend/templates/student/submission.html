<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Submitted - ExamyNex</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../static/css/main.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-brand">
            <h3><i class="bi bi-mortarboard-fill"></i> ExamyNex</h3>
            <small>Student Panel</small>
        </div>
        <ul class="sidebar-menu">
            <li><a href="dashboard.html" data-menu="dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li><a href="exams.html" data-menu="exams"><i class="bi bi-file-earmark-text"></i> My Exams</a></li>
            <li><a href="results.html" data-menu="results"><i class="bi bi-clipboard-check"></i> Results</a></li>
            <li><a href="../../templates/auth/login.html"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="text-center">
            <div class="card" style="max-width: 600px; margin: 50px auto;">
                <div class="card-body p-5">
                    <div class="mb-4">
                        <i class="bi bi-check-circle-fill text-success" style="font-size: 5rem;"></i>
                    </div>
                    <h2 class="mb-3">Exam Submitted Successfully!</h2>
                    
                    <div class="alert alert-info">
                        <p class="mb-0">
                            <strong>Submission Type:</strong> 
                            <span id="submissionType">Normal</span>
                        </p>
                    </div>
                    
                    <p class="text-muted mb-4">
                        Your exam has been submitted. Results will be available after evaluation.
                    </p>
                    
                    <div class="d-grid gap-2">
                        <a href="results.html" class="btn btn-primary">
                            <i class="bi bi-clipboard-check"></i> View Results
                        </a>
                        <a href="dashboard.html" class="btn btn-secondary">
                            <i class="bi bi-house"></i> Back to Dashboard
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../static/js/utils.js"></script>
    <script>
        // Get submission type from URL
        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type') || 'normal';
        
        const submissionTypeElement = document.getElementById('submissionType');
        if (type === 'auto') {
            submissionTypeElement.textContent = 'Auto-Submitted';
            submissionTypeElement.parentElement.classList.remove('alert-info');
            submissionTypeElement.parentElement.classList.add('alert-warning');
        } else {
            submissionTypeElement.textContent = 'Normal';
        }
    </script>
</body>
</html>
