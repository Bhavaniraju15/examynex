<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="../../static/css/main.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-brand">
            <h3><i class="bi bi-mortarboard-fill"></i> ExamyNex</h3>
            <small>Admin Panel</small>
        </div>
        <ul class="sidebar-menu">
            <li><a href="dashboard.html" data-menu="dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li><a href="faculty-approvals.html" data-menu="approvals"><i class="bi bi-person-check"></i> Faculty Approvals</a></li>
            <li><a href="students.html" data-menu="students" class="active"><i class="bi bi-people"></i> Students</a></li>
            <li><a href="faculty.html" data-menu="faculty"><i class="bi bi-mortarboard"></i> Faculty</a></li>
            <li><a href="exams.html" data-menu="exams"><i class="bi bi-file-earmark-text"></i> Exams</a></li>
            <li><a href="audit-logs.html" data-menu="audit"><i class="bi bi-journal-text"></i> Audit Logs</a></li>
            <li><a href="profile.html" data-menu="profile"><i class="bi bi-person"></i> Profile</a></li>
            <li><a href="../../templates/auth/login.html"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <h2 class="mb-4"><i class="bi bi-people"></i> Student Management</h2>
        
        <div id="alertContainer"></div>
        
        <!-- Filters -->
        <div class="card mb-3">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4">
                        <label class="form-label">Branch</label>
                        <select class="form-select" id="filterBranch">
                            <option value="">All Branches</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Semester</label>
                        <select class="form-select" id="filterSemester">
                            <option value="">All Semesters</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">&nbsp;</label>
                        <button class="btn btn-primary w-100" onclick="filterStudents()">
                            <i class="bi bi-funnel"></i> Filter
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Students List</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Roll No</th>
                                <th>Branch</th>
                                <th>Semester</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../static/js/utils.js"></script>
    <script>
        Utils.setActiveMenu('students');
        
        document.addEventListener('DOMContentLoaded', function() {
            Utils.generateBranchDropdown('filterBranch', true);
            Utils.generateSemesterDropdown('filterSemester', true);
        });
        
        function filterStudents() {
            const branch = document.getElementById('filterBranch').value;
            const semester = document.getElementById('filterSemester').value;
            // Filter logic here
            Utils.showAlert('Filter applied', 'info', 'alertContainer');
        }
        
        function viewStudent(id) {
            // Navigate to student view
            window.location.href = `../../faculty/student-profile.html?id=${id}`;
        }
        
        function deleteStudent(id) {
            if (confirm('Are you sure you want to delete this student?')) {
                // Placeholder API call
                Utils.showAlert('Student deleted successfully', 'success', 'alertContainer');
            }
        }
        
        function forceLogout(id) {
            if (confirm('Force logout this student?')) {
                // Placeholder API call
                Utils.showAlert('Student logged out successfully', 'success', 'alertContainer');
            }
        }
    </script>
</body>
</html>
